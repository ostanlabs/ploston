name: Rebuild

on:
  workflow_call:
    inputs:
      cascade_id:
        description: 'Cascade ID from the triggering cascade'
        required: true
        type: string
      core_version:
        description: 'ploston-core version to build against'
        required: true
        type: string
      source:
        description: 'Package source: test-pypi or pypi'
        required: false
        type: string
        default: 'test-pypi'
    outputs:
      image_tag:
        description: 'Docker image tag produced (sha-<commit>)'
        value: ${{ jobs.rebuild.outputs.image_tag }}
      sha:
        description: 'Git SHA of the ploston repo at build time'
        value: ${{ jobs.rebuild.outputs.sha }}
      status:
        description: 'Build status: success or failure'
        value: ${{ jobs.rebuild.outputs.status }}
    secrets:
      META_REPO_TOKEN:
        required: true
      DASHBOARD_GIST_ID:
        required: true

concurrency:
  group: ploston-rebuild-${{ inputs.cascade_id || github.sha }}
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 10
    outputs:
      status: ${{ steps.result.outputs.status }}
      error: ${{ steps.result.outputs.error }}
      image_tag: ${{ steps.repo-sha.outputs.image_tag }}
      sha: ${{ steps.repo-sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ostanlabs/ploston

      - name: Resolve repo SHA
        id: repo-sha
        run: |
          SHA=$(git rev-parse HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "image_tag=sha-$SHA" >> $GITHUB_OUTPUT

      - name: Check for existing artifact (skip optimization)
        id: skip-check
        run: |
          # Check if image exists with matching core_version label
          EXISTING=$(docker manifest inspect ghcr.io/ostanlabs/ploston-dev:${{ steps.repo-sha.outputs.image_tag }} 2>/dev/null || echo "")
          if [[ -n "$EXISTING" ]]; then
            # TODO: Check core_version label matches
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Image already exists, skipping rebuild"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install uv
        if: steps.skip-check.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        if: steps.skip-check.outputs.skip != 'true'
        run: uv python install 3.12

      - name: Install dependencies
        if: steps.skip-check.outputs.skip != 'true'
        run: uv sync --all-extras --dev

      - name: Update core dependency
        if: steps.skip-check.outputs.skip != 'true'
        run: |
          SOURCE=${{ inputs.source }}
          VERSION=${{ inputs.core_version }}

          echo "Installing ploston-core==$VERSION from $SOURCE..."
          uv cache clean ploston-core

          if [[ "$SOURCE" == "test-pypi" ]]; then
            # Retry loop for Test PyPI CDN propagation delays
            MAX_ATTEMPTS=5
            ATTEMPT=1
            while [[ $ATTEMPT -le $MAX_ATTEMPTS ]]; do
              echo "Attempt $ATTEMPT of $MAX_ATTEMPTS..."
              if uv pip install --python .venv/bin/python ploston-core==$VERSION \
                --index-url https://test.pypi.org/simple \
                --no-deps \
                --refresh; then
                echo "Successfully installed ploston-core==$VERSION"
                break
              fi
              if [[ $ATTEMPT -eq $MAX_ATTEMPTS ]]; then
                echo "Failed to install ploston-core==$VERSION after $MAX_ATTEMPTS attempts"
                exit 1
              fi
              echo "Install failed, waiting 10s before retry (CDN propagation)..."
              sleep 10
              ((ATTEMPT++))
            done
          else
            uv pip install --python .venv/bin/python ploston-core==$VERSION
          fi

          echo "Installed:"
          uv pip show --python .venv/bin/python ploston-core

      - name: Lint
        if: steps.skip-check.outputs.skip != 'true'
        run: make lint

      - name: Unit tests
        if: steps.skip-check.outputs.skip != 'true'
        run: make test-unit

      - name: Log in to GHCR
        if: steps.skip-check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.META_REPO_TOKEN }}

      - name: Set up QEMU (for multi-arch builds)
        if: steps.skip-check.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.skip-check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build images
        if: steps.skip-check.outputs.skip != 'true'
        run: |
          make build-image IMAGE_TAG=${{ steps.repo-sha.outputs.image_tag }} \
            CORE_VERSION=${{ inputs.core_version }} \
            CORE_SOURCE=${{ inputs.source }}

      - name: Push images
        if: steps.skip-check.outputs.skip != 'true'
        run: make push-image IMAGE_TAG=${{ steps.repo-sha.outputs.image_tag }}

      - name: Set result
        id: result
        run: |
          echo "status=success" >> $GITHUB_OUTPUT
          echo "error=" >> $GITHUB_OUTPUT

  update-dashboard:
    needs: rebuild
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Update dashboard
        uses: ostanlabs/ploston-core/.github/actions/update-dashboard@main
        with:
          repo: ploston
          cascade_id: ${{ inputs.cascade_id }}
          sha: ${{ needs.rebuild.outputs.sha }}
          core_version: ${{ inputs.core_version }}
          status: ${{ needs.rebuild.result == 'success' && 'success' || 'failure' }}
          error: ${{ needs.rebuild.outputs.error || '' }}
          artifact_image_tag: ${{ needs.rebuild.outputs.image_tag || '' }}
          gist_id: ${{ secrets.DASHBOARD_GIST_ID }}
          token: ${{ secrets.META_REPO_TOKEN }}
