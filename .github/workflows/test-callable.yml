name: Test Callable
on:
  workflow_call:
    inputs:
      message:
        type: string
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: test-${{ inputs.message }}
  cancel-in-progress: false

env:
  TEST_TAG: sha-${{ github.sha }}

jobs:
  echo-job:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.out.outputs.result }}
    steps:
      - run: echo "${{ inputs.message }}"
      - id: out
        run: echo "result=ok" >> $GITHUB_OUTPUT
